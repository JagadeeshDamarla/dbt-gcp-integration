# workflow.yaml
# Orchestrates the execution of the dbt Cloud Run Job.

main:
  params: [args]
  steps:
    - init_variables:
        assign:
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - region: "us-central1"
          # This matches the JOB_NAME in your GitHub Actions env block
          - job_name: "dbt-snowflake-production-job"
          - notification_template: ${args.notification_template}
          - slack_webhook_secret_resource: ${notification_template.slack_webhook_secret_resource}
          - now_ts: ${sys.now()}
          - default_from_date: ${text.substring(time.format(now_ts), 0, 10)}
          - default_to_date: ${text.substring(time.format(now_ts - 86400), 0, 10)}
          - dbt_from_date: ${default_from_date}
          - dbt_to_date: ${default_to_date}

    - apply_dbt_param_overrides:
        switch:
          - condition: ${"dbt_params" in args}
            steps:
              - set_dbt_param_overrides:
                  assign:
                    - dbt_from_date: ${default(map.get(args.dbt_params, "from_date"), dbt_from_date)}
                    - dbt_to_date: ${default(map.get(args.dbt_params, "to_date"), dbt_to_date)}

    - try_log_effective_dbt_dates:
        try:
          steps:
            - log_effective_dbt_dates:
                call: sys.log
                args:
                  severity: "INFO"
                  text: '${"Effective dbt date params: from_date=" + dbt_from_date + ", to_date=" + dbt_to_date}'
        except:
          as: log_effective_dbt_dates_error
          steps:
            - ignore_log_permission_error:
                assign:
                  - _ignored_log_error: ${log_effective_dbt_dates_error}

    - load_slack_webhook_secret:
        call: googleapis.secretmanager.v1.projects.secrets.versions.access
        args:
          name: ${slack_webhook_secret_resource + "/versions/latest"}
        result: slack_secret_response

    - decode_slack_webhook_secret:
        assign:
          - slack_webhook_url: ${text.decode(base64.decode(slack_secret_response.payload.data))}

    - notify_slack_start:
        try:
          steps:
            - build_start_payload:
                call: build_slack_payload
                args:
                  notification_template: ${notification_template}
                  job_name: ${job_name}
                  status: "started"
                  region: ${region}
                  operation: "pending"
                  workflow_execution: ${sys.get_env("GOOGLE_CLOUD_WORKFLOW_EXECUTION_ID")}
                  failure_reason: ""
                result: slack_start_payload
            - post_start_message:
                call: http.post
                args:
                  url: ${slack_webhook_url}
                  headers:
                    Content-Type: "application/json"
                  body: ${slack_start_payload}
        except:
          as: slack_start_error
          steps:
            - log_start_notification_error:
                call: sys.log
                args:
                  severity: "WARNING"
                  text: '${"Slack start notification failed: " + json.encode_to_string(slack_start_error)}'

    # 1. Execute the Cloud Run Job with Error Handling
    - run_job_block:
        try:
          steps:
            # Trigger the Cloud Run Job
            - trigger_cloud_run_job:
                call: http.post
                args:
                  url: ${"https://run.googleapis.com/v2/projects/" + project_id + "/locations/" + region + "/jobs/" + job_name + ":run"}
                  auth:
                    type: OAuth2
                  body:
                    overrides:
                      containerOverrides:
                        - env:
                            - name: "DBT_FROM_DATE"
                              value: ${dbt_from_date}
                            - name: "DBT_TO_DATE"
                              value: ${dbt_to_date}
                result: job_execution_response

            - capture_operation_name:
                assign:
                  - operation_name: ${job_execution_response.body.name}

            # 2. Wait for the job to finish (Polling)
            - check_job_status:
                call: http.get
                args:
                  # This hits the 'Operations' API endpoint returned by the trigger step
                  url: ${"https://run.googleapis.com/v2/" + operation_name}
                  auth:
                    type: OAuth2
                result: execution_status

            # 3. Evaluate the state of the long-running operation
            - evaluate_status:
                switch:
                  # Condition A: Operation is still running (done is false or missing)
                  - condition: ${not("done" in execution_status.body) or not(execution_status.body.done)}
                    steps:
                      - sleep:
                          call: sys.sleep
                          args:
                            seconds: 30
                      - loop_back:
                          next: check_job_status

                  # Condition A2: Wait for completion metadata to become available
                  - condition: ${not("response" in execution_status.body) or not("completionTime" in execution_status.body.response)}
                    steps:
                      - sleep_for_completion:
                          call: sys.sleep
                          args:
                            seconds: 30
                      - loop_back_for_completion:
                          next: check_job_status
                  
                  # Condition B: Cloud Run infrastructure failed (e.g., timeout, out of memory)
                  - condition: ${"error" in execution_status.body}
                    steps:
                      - raise_infrastructure_error:
                          raise: ${execution_status.body.error}

                  # Condition C: Container ran, but dbt failed internally (non-zero exit code)
                  - condition: ${"response" in execution_status.body and "failedCount" in execution_status.body.response and execution_status.body.response.failedCount > 0}
                    steps:
                      - raise_execution_error:
                          raise: '${"Cloud Run Job container exited with a failure. Final response: " + json.encode_to_string(execution_status.body.response)}'

                  # Condition D: Operation finished but not explicitly successful
                  - condition: ${not("response" in execution_status.body and "succeededCount" in execution_status.body.response and execution_status.body.response.succeededCount > 0)}
                    steps:
                      - raise_non_success_completion:
                          raise: '${"Cloud Run Job completed without explicit success. Final response: " + json.encode_to_string(execution_status.body)}'

            - notify_slack_success:
                try:
                  steps:
                    - build_success_payload:
                        call: build_slack_payload
                        args:
                          notification_template: ${notification_template}
                          job_name: ${job_name}
                          status: "success"
                          region: ${region}
                          operation: ${operation_name}
                          workflow_execution: ${sys.get_env("GOOGLE_CLOUD_WORKFLOW_EXECUTION_ID")}
                          failure_reason: ""
                        result: slack_success_payload
                    - post_success_message:
                        call: http.post
                        args:
                          url: ${slack_webhook_url}
                          headers:
                            Content-Type: "application/json"
                          body: ${slack_success_payload}
                except:
                  as: slack_success_error
                  steps:
                    - log_success_notification_error:
                        call: sys.log
                        args:
                          severity: "WARNING"
                          text: '${"Slack success notification failed: " + json.encode_to_string(slack_success_error)}'

        # Catch any raised failures and fail the workflow run explicitly
        except:
          as: e
          steps:
            - notify_slack_failure:
                try:
                  steps:
                    - build_failure_payload:
                        call: build_slack_payload
                        args:
                          notification_template: ${notification_template}
                          job_name: ${job_name}
                          status: "failure"
                          region: ${region}
                          operation: ${default(operation_name, "unknown")}
                          workflow_execution: ${sys.get_env("GOOGLE_CLOUD_WORKFLOW_EXECUTION_ID")}
                          failure_reason: ${json.encode_to_string(e)}
                        result: slack_failure_payload
                    - post_failure_message:
                        call: http.post
                        args:
                          url: ${slack_webhook_url}
                          headers:
                            Content-Type: "application/json"
                          body: ${slack_failure_payload}
                except:
                  as: slack_failure_error
                  steps:
                    - log_failure_notification_error:
                        call: sys.log
                        args:
                          severity: "WARNING"
                          text: '${"Slack failure notification failed: " + json.encode_to_string(slack_failure_error)}'
            - fail_workflow:
                raise: ${e}

build_slack_payload:
  params: [notification_template, job_name, status, region, operation, workflow_execution, failure_reason]
  steps:
    - choose_status_icon:
        switch:
          - condition: ${status == "success"}
            steps:
              - set_success_icon:
                  assign:
                    - status_icon: ${notification_template.status_icons.success}
                    - status_detail: ""
          - condition: ${status == "failure"}
            steps:
              - set_failure_icon:
                  assign:
                    - status_icon: ${notification_template.status_icons.failure}
                    - status_detail: ${"\n*reason:* " + default(failure_reason, "unknown")}
          - condition: true
            steps:
              - set_started_icon:
                  assign:
                    - status_icon: ${notification_template.status_icons.started}
                    - status_detail: ""

    - render_payload:
        assign:
          - payload:
              text: ${job_name + " | " + status}
              blocks:
                - type: "header"
                  text:
                    type: "plain_text"
                    text: ${job_name}
                    emoji: true
                - type: "section"
                  text:
                    type: "mrkdwn"
                    text: ${status_icon + " *status:* " + status + status_detail}
                - type: "section"
                  fields:
                    - type: "mrkdwn"
                      text: ${"*" + notification_template.attributes.region + ":*\n" + region}
                    - type: "mrkdwn"
                      text: ${"*" + notification_template.attributes.operation + ":*\n" + operation}
                    - type: "mrkdwn"
                      text: ${"*" + notification_template.attributes.workflow_execution + ":*\n" + workflow_execution}

    - return_payload:
        return: ${payload}