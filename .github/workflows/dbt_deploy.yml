name: "Build and Deploy dbt Models"
on:
  push:
    branches: [main]
    paths: [
      'models/**', 
      'macros/**', 
      'seeds/**', 
      'snapshots/**', 
      'tests/**', 
      'dbt_project.yml', 
      'packages.yml', 
      'profiles.yml', 
      'Dockerfile'
    ]
permissions:
  contents: read
  id-token: write
env:
  PROJECT_ID: "new-map-project-1538399427267"
  REGION: "us-central1"
  IMAGE_NAME: "dbt-images/dbt-snowflake"
  JOB_NAME: "dbt-snowflake-production-job"
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: 'projects/YOUR_PROJECT_NUMBER/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
        service_account: 'github-actions-dbt@new-map-project-1538399427267.iam.gserviceaccount.com'
    - uses: docker/login-action@v3
      with:
        registry: ${{ env.REGION }}-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}
    - uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest
    - name: Update GCP Cloud Run Job
      run: |
        gcloud run jobs update ${{ env.JOB_NAME }} \
          --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          --region=${{ env.REGION }}