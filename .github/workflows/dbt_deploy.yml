name: "Build and Deploy dbt Models"
on:
  workflow_dispatch:
    inputs:
      project:
        description: "dbt project to deploy"
        required: true
        type: choice
        options:
          - dbt_airflow_test
permissions:
  contents: read
  id-token: write
env:
  PROJECT_ID: "new-map-project-1538399427267"
  REGION: "us-central1"
  REPOSITORY: "dbt-images"
  WIF_PROVIDER: "projects/995265336172/locations/global/workloadIdentityPools/github-dbt-pool/providers/github-dbt-provider"
  DEPLOYER_SERVICE_ACCOUNT: "github-actions-dbt@new-map-project-1538399427267.iam.gserviceaccount.com"
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    steps:
    - uses: actions/checkout@v4
    - name: Resolve project settings
      shell: bash
      run: |
        python3 scripts/resolve_deploy_project.py --project "${{ github.event.inputs.project }}"
    - id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ env.WIF_PROVIDER }}
        service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}
        token_format: 'access_token'
    - uses: docker/login-action@v3
      with:
        registry: ${{ env.REGION }}-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}
    - name: Validate Artifact Registry Repository
      run: |
        gcloud artifacts repositories describe ${{ env.REPOSITORY }} \
          --project=${{ env.PROJECT_ID }} \
          --location=${{ env.REGION }}
    - name: Validate Cloud Run Job Name
      run: |
        if ! [[ "${{ env.JOB_NAME }}" =~ ^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?$ ]]; then
          echo "Invalid JOB_NAME: ${{ env.JOB_NAME }}"
          echo "Must be 1-63 chars, lowercase letters/numbers/dashes, and cannot start or end with dash."
          exit 1
        fi
    - name: Set up Python for dbt tests
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dbt dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r "${DBT_PROJECT_DIR}/requirements.txt"
    - name: Run dbt tests
      run: |
        SNOWFLAKE_PASSWORD="$(gcloud secrets versions access latest \
          --secret=SNOWFLAKE_PASSWORD \
          --project="${PROJECT_ID}")"

        echo "::add-mask::${SNOWFLAKE_PASSWORD}"

        FROM_DATE="$(date -u -d '1 day ago' +%F)"
        TO_DATE="$(date -u +%F)"

        dbt seed \
          --project-dir "${DBT_PROJECT_DIR}" \
          --profiles-dir "${DBT_PROJECT_DIR}"

        if [[ -n "${DBT_MODEL_SELECTOR}" ]]; then
          dbt build \
            --project-dir "${DBT_PROJECT_DIR}" \
            --profiles-dir "${DBT_PROJECT_DIR}" \
            --select ${DBT_MODEL_SELECTOR} \
            --vars "{\"from_date\": \"${FROM_DATE}\", \"to_date\": \"${TO_DATE}\"}"
        else
          dbt build \
            --project-dir "${DBT_PROJECT_DIR}" \
            --profiles-dir "${DBT_PROJECT_DIR}" \
            --vars "{\"from_date\": \"${FROM_DATE}\", \"to_date\": \"${TO_DATE}\"}"
        fi
    - uses: docker/build-push-action@v5
      with:
        context: ./${{ env.DBT_PROJECT_DIR }}
        file: ./${{ env.DBT_PROJECT_DIR }}/Dockerfile
        push: true
        tags: |
          ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest
    - name: Validate Cloud Run Job Exists
      run: |
        gcloud run jobs describe ${{ env.JOB_NAME }} \
          --project=${{ env.PROJECT_ID }} \
          --region=${{ env.REGION }}
    - name: Update GCP Cloud Run Job Image
      run: |
        gcloud run jobs update ${{ env.JOB_NAME }} \
          --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          --project=${{ env.PROJECT_ID }} \
          --region=${{ env.REGION }}