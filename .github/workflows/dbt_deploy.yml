name: "Build and Deploy dbt Models"
on:
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  IMAGE_NAME: ${{ vars.ARTIFACT_IMAGE_NAME }}
  JOB_NAME: ${{ vars.CLOUD_RUN_JOB_NAME }}
  WORKFLOW_NAME: ${{ vars.WORKFLOW_NAME }}
  WIF_PROVIDER: ${{ vars.WIF_PROVIDER }}
  DEPLOYER_SERVICE_ACCOUNT: ${{ vars.DEPLOYER_SERVICE_ACCOUNT }}
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ env.WIF_PROVIDER }}
        service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}
    - uses: docker/login-action@v3
      with:
        registry: ${{ env.REGION }}-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}
    - uses: docker/build-push-action@v5
      with:
        context: ./dbt_airflow_test
        file: ./dbt_airflow_test/Dockerfile
        push: true
        tags: |
          ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest
    - name: Update GCP Cloud Run Job
      run: |
        gcloud run jobs update ${{ env.JOB_NAME }} \
          --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          --project=${{ env.PROJECT_ID }} \
          --region=${{ env.REGION }}
    - name: Deploy Workflow Definition
      if: ${{ env.WORKFLOW_NAME != '' }}
      run: |
        gcloud workflows deploy ${{ env.WORKFLOW_NAME }} \
          --source=config/workflow.yaml \
          --location=${{ env.REGION }} \
          --project=${{ env.PROJECT_ID }}